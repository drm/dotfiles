# i3status configuration. Mirrors Debian's /etc/i3status.conf default plus the
# fs_watch block (surfaces FS-WATCH alert count from ~/.cache/fs-watch.status,
# populated by the fs-watch-status.timer user service).

general {
        colors = true
        interval = 5
        markup = "pango"
}

order += "ipv6"
order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "disk /"
order += "read_file fs_watch"
order += "load"
order += "memory"
order += "tztime local"

read_file fs_watch {
        format = "%content"
        path = "/home/gerard/.cache/fs-watch.status"
}

wireless _first_ {
        format_up = "W: (%quality at %essid) %ip"
        format_down = "W: down"
}

ethernet _first_ {
        format_up = "E: %ip (%speed)"
        format_down = "E: down"
}

battery all {
        format = "%status %percentage %remaining"
}

disk "/" {
        format = "%avail"
}

load {
        format = "%1min"
}

memory {
        format = "%used | %available"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "%Y-%m-%d %H:%M:%S"
}
